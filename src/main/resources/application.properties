spring.application.name=ShoppingListServices
spring.datasource.url=jdbc:mariadb://localhost:3306/shopping_list_db
spring.datasource.driverClassName=org.mariadb.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

server.port=5443

spring.threads.virtual.enabled=true

logging.file.name=logs/application.log

server.servlet.encoding.enabled=true


spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.url=jdbc:mariadb://localhost:3306/shopping_list_db
spring.flyway.driver-class-name=org.mariadb.jdbc.Driver
# If you changed an already-applied migration (e.g. V2) and Flyway fails with a checksum mismatch, set
# this to true for a single application start so Flyway can repair schema history, then set back to false.
# Alternatively run: mvn flyway:repair (with DB credentials configured for the Flyway Maven plugin).
app.flyway.repair-before-migrate=false
user.service.base-url=http://localhost:4443/user

management.endpoints.enabled-by-default=false






